<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Nhân Viên - HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .timeline-item { border-left: 3px solid #0d6efd; padding-left: 20px; position: relative; padding-bottom: 20px; }
        .timeline-item::before { content: ""; position: absolute; width: 12px; height: 12px; background: #0d6efd; border-radius: 50%; left: -8px; top: 5px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/quan-ly-nhan-vien">← Quay lại danh sách nhân viên</a>
    </div>
</nav>

<div class="container mb-5">
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white fw-bold text-primary">Chỉnh Sửa Thông Tin</div>
                <div class="card-body">
                    <form id="formUpdateNhanVien">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" id="hoTen" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email công việc</label>
                            <input type="email" class="form-control" id="emailCongViec" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" class="form-control" id="soDienThoai">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số CCCD</label>
                            <input type="text" class="form-control" id="soCccd" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Lưu Thay Đổi</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold text-success">Lịch Sử Công Tác & Sự Kiện</div>
                <div class="card-body">
                    <div id="historyTimeline">
                        <p class="text-center text-muted">Đang tải lịch sử...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token') || '';
    const urlParams = new URLSearchParams(window.location.search);
    const employeeId = urlParams.get('id');

    // 1. Load dữ liệu hồ sơ
    function loadEmployeeData() {
        fetch(`/api/employees/${employeeId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(nv => {
            document.getElementById('hoTen').value = nv.hoTen;
            document.getElementById('emailCongViec').value = nv.emailCongViec;
            document.getElementById('soDienThoai').value = nv.soDienThoai || '';
            document.getElementById('soCccd').value = nv.soCccd;
        });
    }

    // 2. Load lịch sử (Timeline)
    function loadHistory() {
        fetch(`/api/history/cong-tac/${employeeId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('historyTimeline');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p class="text-center text-muted">Chưa có lịch sử biến động.</p>';
                return;
            }

            data.forEach(h => {
                const date = new Date(h.tuNgay).toLocaleDateString('vi-VN');
                let detail = "";

                // Phân loại nội dung hiển thị
                if(h.phongBanMoi) {
                    detail = `<span class="badge bg-info text-dark">Điều chuyển</span><br>
                              Từ: <b>${h.phongBanCu || 'N/A'}</b> → Sang: <b>${h.phongBanMoi}</b>`;
                } else {
                    detail = `<span class="badge bg-secondary">Sự kiện</span>`;
                }

                container.innerHTML += `
                    <div class="timeline-item">
                        <small class="text-muted">${date}</small>
                        <p class="mb-1">${detail}</p>
                        <small class="text-muted italic">"${h.ghiChu || 'Không có ghi chú'}"</small>
                    </div>`;
            });
        });
    }

    // 3. Xử lý cập nhật
    document.getElementById('formUpdateNhanVien').addEventListener('submit', function(e) {
        e.preventDefault();
        const updatedData = {
            hoTen: document.getElementById('hoTen').value,
            emailCongViec: document.getElementById('emailCongViec').value,
            soDienThoai: document.getElementById('soDienThoai').value,
            soCccd: document.getElementById('soCccd').value
        };

        fetch(`/api/employees/${employeeId}/update-profile`, {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedData)
        })
        .then(res => {
            if(res.ok) {
                alert('Cập nhật thành công!');
                loadEmployeeData();
            }
        });
    });

    window.onload = () => {
        loadEmployeeData();
        loadHistory();
    };
</script>
</body>
</html>
