<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Phòng Ban - HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f4f7f6; }
        .sidebar { width: 260px; background: #2c3e50; color: white; flex-shrink: 0; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: white; border-left: 4px solid #3498db; }
        .main-content { flex-grow: 1; padding: 30px; }
        .nav-header { font-size: 0.75rem; text-uppercase: uppercase; color: #7f8c8d; padding: 15px 20px 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div class="p-4 text-center"><h4 class="text-white">HRM PRO</h4><small class="text-muted">Admin Panel</small></div>
    <hr class="mx-3 opacity-25">
    <a href="/home">🏠 Trang Chủ</a>
    <div class="nav-header">Tổ chức</div>
    <a href="/chi-nhanh">🏢 Chi Nhánh</a>
    <a href="/phong-ban" class="active">📂 Phòng Ban</a>
    <a href="/nhom">👥 Nhóm / Tổ</a>
    <a href="/quan-ly-chuc-vu">🎖️ Chức Vụ</a>
    <div class="nav-header">Nhân sự</div>
    <a href="/quan-ly-nhan-vien">📋 Danh Sách NV</a>
    <a href="/them-nhan-vien">➕ Onboarding</a>
    <a href="/ban-hanh-quyet-dinh">📜 Quyết Định</a>
    <hr class="mx-3 opacity-25 mt-auto">
    <a href="#" onclick="logout()" class="text-danger">🚪 Đăng xuất</a>
</div>

<div class="main-content">
    <h3 class="text-primary fw-bold mb-4">📂 Quản Lý Phòng Ban</h3>
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold">Thêm Phòng Ban Mới</div>
                <div class="card-body">
                    <form id="formAddPB">
                        <div class="mb-3">
                            <label class="form-label">Tên phòng ban</label>
                            <input type="text" class="form-control" id="tenPB" required placeholder="VD: Phòng IT">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Thuộc Chi nhánh</label>
                            <select class="form-select" id="selCN" required>
                                <option value="" disabled selected>--- Chọn chi nhánh ---</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 shadow-sm">Lưu Phòng Ban</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr><th>ID</th><th>Tên Phòng Ban</th><th>Chi Nhánh</th></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token') || '';
    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    async function loadData() {
        try {
            // Load danh sách Chi nhánh cho ô chọn
            const resCN = await fetch('/api/organizations/chi-nhanh', { headers });
            const chiNhanhs = await resCN.json();
            const selCN = document.getElementById('selCN');
            chiNhanhs.forEach(cn => selCN.innerHTML += `<option value="${cn.id}">${cn.tenChiNhanh}</option>`);

            // Load danh sách Phòng ban lên bảng
            const resPB = await fetch('/api/organizations/phong-ban', { headers });
            const phongBans = await resPB.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            phongBans.forEach(pb => {
                tbody.innerHTML += `<tr>
                    <td><strong>${pb.id}</strong></td>
                    <td>${pb.tenPhongBan}</td>
                    <td><span class="badge bg-info text-dark">${pb.chiNhanh ? pb.chiNhanh.tenChiNhanh : 'Chưa gán'}</span></td>
                </tr>`;
            });
        } catch (e) { console.error("Lỗi tải dữ liệu:", e); }
    }

    document.getElementById('formAddPB').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            tenPhongBan: document.getElementById('tenPB').value,
            chiNhanh: { id: document.getElementById('selCN').value }
        };
        fetch('/api/organizations/phong-ban', {
            method: 'POST', headers, body: JSON.stringify(data)
        }).then(res => {
            if(res.ok) { alert('Thành công!'); location.reload(); }
        });
    });

    function logout() { localStorage.clear(); window.location.href = '/login'; }
    window.onload = loadData;
</script>
</body>
</html>
