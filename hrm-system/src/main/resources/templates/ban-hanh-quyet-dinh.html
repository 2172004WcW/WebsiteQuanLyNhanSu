<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ban Hành Quyết Định - HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f4f7f6; }
        .sidebar { width: 260px; background: #2c3e50; color: white; flex-shrink: 0; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: white; border-left: 4px solid #3498db; }
        .main-content { flex-grow: 1; padding: 30px; }
        .nav-header { font-size: 0.75rem; text-uppercase: uppercase; color: #7f8c8d; padding: 15px 20px 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div class="p-4 text-center"><h4 class="text-white">HRM PRO</h4><small class="text-muted">Admin Panel</small></div>
    <hr class="mx-3 opacity-25">
    <a href="/home">🏠 Trang Chủ</a>
    <div class="nav-header">Tổ chức</div>
    <a href="/chi-nhanh">🏢 Chi Nhánh</a>
    <a href="/phong-ban">📂 Phòng Ban</a>
    <a href="/nhom">👥 Nhóm / Tổ</a>
    <a href="/quan-ly-chuc-vu">🎖️ Chức Vụ</a>
    <div class="nav-header">Nhân sự</div>
    <a href="/quan-ly-nhan-vien">📋 Danh Sách NV</a>
    <a href="/them-nhan-vien">➕ Onboarding</a>
    <a href="/ban-hanh-quyet-dinh" class="active">📜 Quyết Định</a>
    <hr class="mx-3 opacity-25 mt-auto">
    <a href="#" onclick="logout()" class="text-danger">🚪 Đăng xuất</a>
</div>

<div class="main-content">
    <div class="card shadow border-0 p-4">
        <h3 class="text-danger mb-4">📜 Ban Hành Quyết Định Nhân Sự</h3>
        <form id="formQuyetDinh">
            <div class="mb-3">
                <label class="form-label fw-bold">1. Chọn Nhân Viên</label>
                <select class="form-select" id="selectNV" required><option value="">Đang tải...</option></select>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">2. Loại Quyết Định</label>
                    <select class="form-select" id="loaiQD" required onchange="toggleFields()">
                        <option value="DIEU_CHUYEN">Điều chuyển công tác</option>
                        <option value="KHEN_THUONG">Khen thưởng</option>
                        <option value="KY_LUAT">Kỷ luật</option>
                        <option value="THOI_VIEC">Thôi việc / Sa thải</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Số Quyết Định</label>
                    <input type="text" class="form-control" id="soQD" placeholder="VD: QD-2026-001" required>
                </div>
            </div>
            <div id="divDieuChuyen" class="bg-warning bg-opacity-10 p-3 rounded mb-3">
                <h6 class="text-warning fw-bold">Thông tin điều chuyển mới:</h6>
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Phòng ban mới</label>
                        <select class="form-select" id="newPB"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Chức vụ mới</label>
                        <select class="form-select" id="newCV"></select>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Nội dung quyết định / Lý do</label>
                <textarea class="form-control" id="noiDung" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-danger w-100 btn-lg shadow">Ký & Ban Hành Quyết Định</button>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('token') || '';
    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    function toggleFields() {
        const loai = document.getElementById('loaiQD').value;
        document.getElementById('divDieuChuyen').style.display = (loai === 'DIEU_CHUYEN') ? 'block' : 'none';
    }
    function generateSoQD() {
    const loai = document.getElementById('loaiQD').value;
    const nam = new Date().getFullYear();
    // Tạo một số ngẫu nhiên hoặc lấy timestamp để đảm bảo không trùng (Unique)
    const randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');

    let maLoai = "QD";
    if(loai === 'DIEU_CHUYEN') maLoai = "DC";
    if(loai === 'KHEN_THUONG') maLoai = "KT";
    if(loai === 'KY_LUAT') maLoai = "KL";
    if(loai === 'THOI_VIEC') maLoai = "TV";

    // Kết quả: VD 025/2026/DC-G117
    const autoSoQD = `${randomNum}/${nam}/${maLoai}-G117`;
    document.getElementById('soQD').value = autoSoQD;
}

// Gọi hàm này mỗi khi đổi loại quyết định
document.getElementById('loaiQD').addEventListener('change', generateSoQD);
    async function loadData() {
        try {
            const [resNV, resPB, resCV] = await Promise.all([
                fetch('/api/employees', { headers }),
                fetch('/api/organizations/phong-ban', { headers }),
                fetch('/api/organizations/chuc-vu', { headers })
            ]);
            const nvs = await resNV.json();
            const pbs = await resPB.json();
            const cvs = await resCV.json();

            const selNV = document.getElementById('selectNV');
            selNV.innerHTML = '<option value="">-- Chọn nhân viên --</option>';
            nvs.forEach(nv => selNV.innerHTML += `<option value="${nv.id}">${nv.hoTen} (${nv.id})</option>`);

            const selPB = document.getElementById('newPB');
            pbs.forEach(pb => selPB.innerHTML += `<option value="${pb.id}">${pb.tenPhongBan}</option>`);

            const selCV = document.getElementById('newCV');
            cvs.forEach(cv => selCV.innerHTML += `<option value="${cv.id}">${cv.tenChucVu}</option>`);

            toggleFields();
        } catch(e) { console.error(e); }
    }

    document.getElementById('formQuyetDinh').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loai = document.getElementById('loaiQD').value;
        const qdData = {
            soQuyetDinh: document.getElementById('soQD').value,
            loaiQuyetDinh: loai,
            noiDungQuyetDinh: document.getElementById('noiDung').value,
            nhanVien: { id: document.getElementById('selectNV').value },
            ngayKy: new Date().toISOString().split('T')[0]
        };

        let url = `/api/history/quyet-dinh?`;
        if(loai === 'DIEU_CHUYEN') {
            url += `phongBanMoiId=${document.getElementById('newPB').value}&chucVuMoiId=${document.getElementById('newCV').value}`;
        }

        const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(qdData) });
        if(res.ok) { alert('Ban hành thành công!'); location.reload(); }
    });

    function logout() { localStorage.clear(); window.location.href = '/login'; }
    window.onload = loadData;
</script>
</body>
</html>
