<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Nhân Viên Mới - HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; background-color: #f4f7f6; margin: 0; }
        .sidebar { width: 260px; background: #2c3e50; color: white; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: white; border-left: 4px solid #3498db; }
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .nav-header { font-size: 0.75rem; text-uppercase: uppercase; color: #7f8c8d; padding: 15px 20px 5px; font-weight: bold; }
        .card { border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div class="p-4 text-center"><h4 class="text-white">HRM PRO</h4><small class="text-muted">Admin Panel</small></div>
    <hr class="mx-3 opacity-25">
    <a href="/home">🏠 Trang Chủ</a>
    <div class="nav-header">Tổ chức</div>
    <a href="/chi-nhanh">🏢 Chi Nhánh</a>
    <a href="/phong-ban">📂 Phòng Ban</a>
    <a href="/nhom">👥 Nhóm / Tổ</a>
    <a href="/quan-ly-chuc-vu">🎖️ Chức Vụ</a>
    <div class="nav-header">Nhân sự</div>
    <a href="/quan-ly-nhan-vien">📋 Danh Sách NV</a>
    <a href="/them-nhan-vien" class="active">➕ Onboarding</a>
    <a href="/ban-hanh-quyet-dinh">📜 Quyết Định</a>
    <hr class="mx-3 opacity-25 mt-auto">
    <a href="#" onclick="logout()" class="text-danger">🚪 Đăng xuất</a>
</div>

<div class="main-content">
    <div class="container-fluid">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h3 class="mb-0 text-primary fw-bold">➕ Thêm Nhân Viên Mới (Onboarding)</h3>
            </div>
            <div class="card-body p-4">
                <form id="formAddNhanVien">
                    <h5 class="text-secondary mb-3 border-bottom pb-2">Thông tin cá nhân</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="hoTen" required placeholder="Nguyễn Văn A">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Giới tính</label>
                            <select class="form-select" id="gioiTinh">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ngày sinh</label>
                            <input type="date" class="form-control" id="ngaySinh">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số CCCD <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="soCccd" required placeholder="12 chữ số">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" class="form-control" id="soDienThoai" placeholder="09xxxxxx">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Địa chỉ tạm trú</label>
                            <textarea class="form-control" id="diaChiTamTru" rows="2" placeholder="Số nhà, đường..."></textarea>
                        </div>
                    </div>

                    <h5 class="text-secondary mb-3 border-bottom pb-2">Thông tin công việc</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Chi nhánh <span class="text-danger">*</span></label>
                            <select class="form-select" id="selectChiNhanh" required><option value="" disabled selected>Đang tải...</option></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phòng ban <span class="text-danger">*</span></label>
                            <select class="form-select" id="selectPhongBan" required><option value="" disabled selected>Đang tải...</option></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nhóm (Team)</label>
                            <select class="form-select" id="selectNhom"><option value="">Không thuộc nhóm</option></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Chức vụ <span class="text-danger">*</span></label>
                            <select class="form-select" id="selectChucVu" required><option value="" disabled selected>Đang tải...</option></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email công việc <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="emailCongViec" required placeholder="nhanvien@group117.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Ngày vào làm</label>
                            <input type="date" class="form-control" id="ngayVaoLam">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Người quản lý trực tiếp</label>
                            <select class="form-select" id="selectNguoiQuanLy"><option value="">Không có</option></select>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">Lưu & Hoàn Tất Onboarding</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token') || '';
    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    async function fetchDropdownData() {
        try {
            const [resCV, resPB, resCN, resNH, resNV] = await Promise.all([
                fetch('/api/organizations/chuc-vu', { headers }),
                fetch('/api/organizations/phong-ban', { headers }),
                fetch('/api/organizations/chi-nhanh', { headers }),
                fetch('/api/organizations/nhom', { headers }),
                fetch('/api/employees', { headers })
            ]);

            populateSelect('selectChucVu', await resCV.json(), 'tenChucVu');
            populateSelect('selectPhongBan', await resPB.json(), 'tenPhongBan');
            populateSelect('selectChiNhanh', await resCN.json(), 'tenChiNhanh');
            populateSelect('selectNhom', await resNH.json(), 'tenNhom', true);
            populateSelect('selectNguoiQuanLy', await resNV.json(), 'hoTen', true);
        } catch (e) { console.error("Lỗi tải dropdown:", e); }
    }

    function populateSelect(selectId, dataArray, labelField, isOptional = false) {
        const el = document.getElementById(selectId);
        el.innerHTML = isOptional ? '<option value="">--- Không chọn / Để trống ---</option>' : '<option value="" disabled selected>--- Chọn từ danh sách ---</option>';
        dataArray.forEach(item => {
            el.innerHTML += `<option value="${item.id}">${item[labelField]}</option>`;
        });
    }

    document.getElementById('formAddNhanVien').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = {
            hoTen: document.getElementById('hoTen').value,
            gioiTinh: document.getElementById('gioiTinh').value,
            ngaySinh: document.getElementById('ngaySinh').value,
            soCccd: document.getElementById('soCccd').value,
            soDienThoai: document.getElementById('soDienThoai').value,
            diaChiTamTru: document.getElementById('diaChiTamTru').value,
            emailCongViec: document.getElementById('emailCongViec').value,
            ngayVaoLam: document.getElementById('ngayVaoLam').value,
            phongBan: { id: document.getElementById('selectPhongBan').value },
            chucVu: { id: document.getElementById('selectChucVu').value },
            chiNhanh: { id: document.getElementById('selectChiNhanh').value },
            nhom: document.getElementById('selectNhom').value ? { id: document.getElementById('selectNhom').value } : null,
            nguoiQuanLyTruocTiep: document.getElementById('selectNguoiQuanLy').value ? { id: document.getElementById('selectNguoiQuanLy').value } : null
        };

        fetch('/api/employees/onboard', {
            method: 'POST', headers, body: JSON.stringify(formData)
        }).then(res => {
            if(res.ok) { alert('Thêm thành công!'); location.href = '/quan-ly-nhan-vien'; }
            else { alert('Lỗi: Kiểm tra lại quyền Admin hoặc dữ liệu trùng (CCCD/Email).'); }
        });
    });

    function logout() { localStorage.clear(); window.location.href = '/login'; }
    window.onload = fetchDropdownData;
</script>
</body>
</html>
