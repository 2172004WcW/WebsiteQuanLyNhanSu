<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Nhóm - HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; background: #f4f7f6; }
        .sidebar { width: 260px; background: #2c3e50; color: white; flex-shrink: 0; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; color: white; border-left: 4px solid #3498db; }
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .nav-header { font-size: 0.75rem; text-uppercase: uppercase; color: #7f8c8d; padding: 15px 20px 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar shadow">
    <div class="p-4 text-center"><h4 class="text-white">HRM PRO</h4></div>
    <hr class="mx-3 opacity-25">
    <a href="/home">🏠 Trang Chủ</a>
    <div class="nav-header">Tổ chức</div>
    <a href="/chi-nhanh">🏢 Chi Nhánh</a>
    <a href="/phong-ban">📂 Phòng Ban</a>
    <a href="/nhom" class="active">👥 Nhóm / Tổ</a>
    <a href="/quan-ly-chuc-vu">🎖️ Chức Vụ</a>
    <div class="nav-header">Nhân sự</div>
    <a href="/quan-ly-nhan-vien">📋 Danh Sách NV</a>
    <a href="/them-nhan-vien">➕ Onboarding</a>
    <a href="/ban-hanh-quyet-dinh">📜 Quyết Định</a>
    <hr class="mx-3 opacity-25 mt-auto">
    <a href="#" onclick="logout()" class="text-danger">🚪 Đăng xuất</a>
</div>

<div class="main-content">
    <h3 class="text-primary fw-bold mb-4">👥 Quản Lý Nhóm / Tổ</h3>
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white fw-bold">Thêm Nhóm Mới</div>
                <div class="card-body">
                    <form id="formAddNhom">
                        <div class="mb-3"><label class="form-label">Tên nhóm</label><input type="text" class="form-control" id="tenNhom" required></div>
                        <div class="mb-3">
                            <label class="form-label">Thuộc Phòng ban</label>
                            <select class="form-select" id="selectPhongBan" required><option value="" disabled selected>--- Chọn phòng ban ---</option></select>
                        </div>
                        <button type="submit" class="btn btn-success w-100 shadow-sm">Lưu Nhóm</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light"><tr><th>Mã Nhóm</th><th>Tên Nhóm</th><th>Phòng Ban</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token') || '';
    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    async function loadData() {
        const resPB = await fetch('/api/organizations/phong-ban', { headers });
        const pbs = await resPB.json();
        const sel = document.getElementById('selectPhongBan');
        pbs.forEach(pb => sel.innerHTML += `<option value="${pb.id}">${pb.tenPhongBan}</option>`);

        const resNhom = await fetch('/api/organizations/nhom', { headers });
        const nhoms = await resNhom.json();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        nhoms.forEach(n => {
            tbody.innerHTML += `<tr><td><strong>${n.id}</strong></td><td>${n.tenNhom}</td><td>${n.phongBan ? n.phongBan.tenPhongBan : 'N/A'}</td></tr>`;
        });
    }

    document.getElementById('formAddNhom').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('/api/organizations/nhom', {
            method: 'POST', headers,
            body: JSON.stringify({ tenNhom: document.getElementById('tenNhom').value, phongBan: { id: document.getElementById('selectPhongBan').value } })
        }).then(res => { if(res.ok) { alert('Thành công!'); location.reload(); } });
    });
    function logout() { localStorage.clear(); window.location.href = '/login'; }
    window.onload = loadData;
</script>
</body>
</html>
